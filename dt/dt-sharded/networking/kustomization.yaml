---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

transformers:
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: _ignored_
      namespace: openstack
    setRoleBindingSubjects: none
    unsetOnly: true
    fieldSpecs:
      - path: metadata/name
        kind: Namespace
        create: true
components:
  - ../../../lib/networking/metallb
  - ../../../lib/networking/netconfig
  - ../../../lib/networking/nad

resources:
  - nad.yaml
  - metallb-designateext.yaml

patches:
  # Add storagemgmt network to NetConfig
  - target:
      kind: NetConfig
      name: netconfig
    patch: |-
      - op: add
        path: /spec/networks/-
        value:
          dnsDomain: _replaced_
          name: storagemgmt
          subnets:
            - _replaced_
          mtu: 1500
  # Add designateext network to NetConfig
  - target:
      kind: NetConfig
      name: netconfig
    patch: |-
      - op: add
        path: /spec/networks/-
        value:
          dnsDomain: _replaced_
          name: designateext
          subnets:
            - _replaced_
          mtu: 1500

replacements:
  # storagemgmt NetConfig
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.storagemgmt.dnsDomain
    targets:
      - select:
          kind: NetConfig
        fieldPaths:
          - spec.networks.[name=storagemgmt].dnsDomain
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.storagemgmt.mtu
    targets:
      - select:
          kind: NetConfig
        fieldPaths:
          - spec.networks.[name=storagemgmt].mtu
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.storagemgmt.subnets
    targets:
      - select:
          kind: NetConfig
        fieldPaths:
          - spec.networks.[name=storagemgmt].subnets
  # designateext MetalLB
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.designateext.lb_addresses
    targets:
      - select:
          kind: IPAddressPool
          name: designateext
        fieldPaths:
          - spec.addresses
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.designateext.iface
    targets:
      - select:
          kind: L2Advertisement
          name: designateext
        fieldPaths:
          - spec.interfaces.0

  # designateext NetConfig
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.designateext.dnsDomain
    targets:
      - select:
          kind: NetConfig
        fieldPaths:
          - spec.networks.[name=designateext].dnsDomain
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.designateext.mtu
    targets:
      - select:
          kind: NetConfig
        fieldPaths:
          - spec.networks.[name=designateext].mtu
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.designateext.subnets
    targets:
      - select:
          kind: NetConfig
        fieldPaths:
          - spec.networks.[name=designateext].subnets

  # designateext NAD config
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.designateext.net-attach-def
    targets:
      - select:
          kind: NetworkAttachmentDefinition
          name: designateext
        fieldPaths:
          - spec.config

  # designate NAD config
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.designate.net-attach-def
    targets:
      - select:
          kind: NetworkAttachmentDefinition
          name: designate
        fieldPaths:
          - spec.config

  # octavia NAD config
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.octavia.net-attach-def
    targets:
      - select:
          kind: NetworkAttachmentDefinition
          name: octavia
        fieldPaths:
          - spec.config
