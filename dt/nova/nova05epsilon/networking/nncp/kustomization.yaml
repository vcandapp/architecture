---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

transformers:
  # Set namespace to OpenStack on all namespaced objects without a namespace
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: _ignored_
      namespace: openstack
    setRoleBindingSubjects: none
    unsetOnly: true
    fieldSpecs:
      - path: metadata/name
        kind: Namespace
        create: true

components:
  - ../../../../../lib/nncp

patches:
  # SNO: remove the extra nodes that lib/nncp defines for 3-node clusters
  - target:
      kind: NodeNetworkConfigurationPolicy
      name: node-1
    patch: |
      $patch: delete
      apiVersion: nmstate.io/v1
      kind: NodeNetworkConfigurationPolicy
      metadata:
        name: node-1
  - target:
      kind: NodeNetworkConfigurationPolicy
      name: node-2
    patch: |
      $patch: delete
      apiVersion: nmstate.io/v1
      kind: NodeNetworkConfigurationPolicy
      metadata:
        name: node-2
  # SNO: remove worker scheduling label from nodeSelector.
  # Use labelSelector because lib/nncp renames the resource before
  # this component's patches run.
  - target:
      kind: NodeNetworkConfigurationPolicy
      labelSelector: "osp/nncm-config-type=standard"
    patch: |-
      - op: remove
        path: /spec/nodeSelector/node-role.kubernetes.io~1worker

  # Add external VLAN interface on ospbr for OVN provider network access.
  - target:
      kind: NodeNetworkConfigurationPolicy
      labelSelector: "osp/nncm-config-type=standard"
    patch: |-
      - op: add
        path: /spec/desiredState/interfaces/-
        value:
          description: external vlan interface on ospbr
          name: external
          state: up
          type: vlan
          mtu: _replaced_
          ipv4:
            address:
            - ip: _replaced_
              prefix-length: _replaced_
            dhcp: false
            enabled: true
          ipv6:
            enabled: false
          vlan:
            base-iface: _replaced_
            id: _replaced_

replacements:
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.node_0.external_ip
    targets:
      - select:
          kind: NodeNetworkConfigurationPolicy
        fieldPaths:
          - spec.desiredState.interfaces.[name=external].ipv4.address.0.ip
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.external.base_iface
    targets:
      - select:
          kind: NodeNetworkConfigurationPolicy
        fieldPaths:
          - spec.desiredState.interfaces.[name=external].vlan.base-iface
        options:
          create: true
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.external.vlan
    targets:
      - select:
          kind: NodeNetworkConfigurationPolicy
        fieldPaths:
          - spec.desiredState.interfaces.[name=external].vlan.id
        options:
          create: true
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.external.mtu
    targets:
      - select:
          kind: NodeNetworkConfigurationPolicy
        fieldPaths:
          - spec.desiredState.interfaces.[name=external].mtu
        options:
          create: true
  - source:
      kind: ConfigMap
      name: network-values
      fieldPath: data.external.prefix-length
    targets:
      - select:
          kind: NodeNetworkConfigurationPolicy
        fieldPaths:
          - spec.desiredState.interfaces.[name=external].ipv4.address.0.prefix-length
        options:
          create: true
