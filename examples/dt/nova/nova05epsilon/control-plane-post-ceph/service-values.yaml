# local-config: referenced, but not emitted by kustomize
#
# Post-Ceph control plane update: adds Glance RBD backend, Ceph
# extraMounts, and preserves all fields from the initial control-plane
# stage that lib/control-plane/base would otherwise reset to defaults.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-values
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  preserveJobs: true
  notificationsBus:
    cluster: rabbitmq
  tls:
    caBundleSecretName: custom-ca-certs
    podLevel:
      enabled: true
  neutron:
    customServiceConfig: |
      [ml2]
      mechanism_drivers = ovn
  nova:
    apiServiceTemplate:
      customServiceConfig: |
        [pci]
        alias = { "vendor_id":"10de", "product_id":"20f1", "device_type":"type-PF", "name":"nvidia_a2" }
        [filter_scheduler]
        pci_in_placement = True
    cell0:
      conductorServiceTemplate:
        customServiceConfig: |
          [filter_scheduler]
          pci_in_placement = True
    cell1:
      conductorServiceTemplate:
        customServiceConfig: |
          [filter_scheduler]
          pci_in_placement = True
    schedulerServiceTemplate:
      customServiceConfig: |
        [filter_scheduler]
        pci_in_placement = True
  telemetry:
    enabled: true
    template:
      ceilometer:
        enabled: true
      logging:
        enabled: false
      metricStorage:
        dashboardsEnabled: true
        enabled: true
        dataplaneNetwork: ctlplane
        networkAttachments:
          - ctlplane
        monitoringStack:
          alertingEnabled: true
          alertmanagerConfig:
            replicas: 1
          scrapeInterval: 30s
          storage:
            persistent:
              pvcStorageClass: lvms-local-storage
              pvcStorageRequest: 20G
              pvcStorageSelector: {}
            retention: 24h
            strategy: persistent
  swift:
    enabled: false
  glance:
    default:
      replicas: 1
    customServiceConfig: |
      [DEFAULT]
      enabled_backends = default_backend:rbd
      [glance_store]
      default_backend = default_backend
      [default_backend]
      rbd_store_ceph_conf = /etc/ceph/ceph.conf
      store_description = "Ceph RBD backend"
      rbd_store_pool = images
      rbd_store_user = openstack
      rbd_thin_provisioning = True
  extraMounts:
    - name: v1
      region: r1
      extraVol:
        - propagation:
            - GlanceAPI
          extraVolType: Ceph
          volumes:
            - name: ceph
              secret:
                secretName: ceph-conf-files
          mounts:
            - name: ceph
              mountPath: /etc/ceph
              readOnly: true
