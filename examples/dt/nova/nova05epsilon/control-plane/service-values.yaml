# local-config: referenced, but not emitted by kustomize
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-values
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  # --- Fields required by lib/control-plane ---
  # must match ../service-values.yaml
  preserveJobs: false
  notificationsBus:
    cluster: rabbitmq
  tls:
    caBundleSecretName: ""

  # --- Below are VA/DT-specific data ---
  neutron:
    customServiceConfig: |
      [ml2]
      mechanism_drivers = ovn
  ovn:
    ovnController:
      nicMappings:
        datacentre: ospbr
  glance:
    default:
      replicas: 0
  swift:
    enabled: false
  telemetry:
    enabled: true
    template:
      ceilometer:
        enabled: true
      logging:
        enabled: false
      metricStorage:
        dashboardsEnabled: true
        enabled: true
        dataplaneNetwork: ctlplane
        networkAttachments:
          - ctlplane
        monitoringStack:
          alertingEnabled: true
          alertmanagerConfig:
            replicas: 1
          scrapeInterval: 30s
          storage:
            persistent:
              pvcStorageClass: lvms-local-storage
              pvcStorageRequest: 20G
              pvcStorageSelector: {}
            retention: 24h
            strategy: persistent
  # Nova GPU PCI passthrough configuration
  nova:
    apiServiceTemplate:
      customServiceConfig: |
        [pci]
        alias = { "vendor_id":"10de", "product_id":"20f1", "device_type":"type-PF", "name":"nvidia_a2" }
        [filter_scheduler]
        pci_in_placement = True
    cell0:
      conductorServiceTemplate:
        customServiceConfig: |
          [filter_scheduler]
          pci_in_placement = True
    cell1:
      conductorServiceTemplate:
        customServiceConfig: |
          [filter_scheduler]
          pci_in_placement = True
    schedulerServiceTemplate:
      customServiceConfig: |
        [filter_scheduler]
        pci_in_placement = True
  # extraMounts for Ceph are applied during the post-ceph stage
  # (see edpm-post-ceph/ kustomization) after ceph-conf-files secret exists.
